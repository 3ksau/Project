spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/product_db}
spring.datasource.username=${DB_USER:product_user}
spring.datasource.password=${DB_PASSWORD:12345}

# Disable SQL logging in Docker (less noise)
spring.jpa.show-sql=false

spring.redis.host=redis
spring.redis.port=6379

# YooKassa
yookassa.return-url=http://localhost:8080/orders
