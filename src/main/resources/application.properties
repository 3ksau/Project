spring.application.name=Shop
server.port=8080
server.servlet.session.tracking-modes=cookie
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/product_db}
spring.datasource.username=${DB_USER:product_user}
spring.datasource.password=${DB_PASSWORD:12345}
spring.jpa.hibernate.ddl-auto=validate

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Thymeleaf hot reload (disable caching for development)
spring.thymeleaf.cache=false

# Show SQL in console (for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
upload.path=uploads

# Cache (in-memory, no Redis required)
spring.cache.type=simple

# Error handling
server.error.path=/error

# OpenAPI / Swagger
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.tryItOutEnabled=true

# Disable Elasticsearch auto-config (enable with profile 'elasticsearch')
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration

# YooKassa (ЮKassa)
yookassa.shop-id=${YOOKASSA_SHOP_ID:}
yookassa.secret-key=${YOOKASSA_SECRET_KEY:}
yookassa.return-url=http://localhost:8080/orders
# Set to true to skip real payment (for testing)
yookassa.mock=${YOOKASSA_MOCK:true}
