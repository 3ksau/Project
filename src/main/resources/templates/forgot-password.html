<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{forgot.title}">Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div class="container">
    <div class="auth-form">
        <div th:if="${success}">
            <h2 th:text="#{forgot.success.title}">Check your email</h2>
            <p th:text="#{forgot.success.text}">If an account with that email exists, we've sent a password reset link.</p>
        </div>
        <div th:unless="${success}">
            <h2 th:text="#{forgot.title}">Forgot Password</h2>
            <p th:text="#{forgot.description}">Enter your email and we'll send you a reset link.</p>
            <form method="post" th:action="@{/forgot-password}">
                <input type="email" name="email" th:placeholder="#{login.email}" required>
                <button type="submit" class="btn" th:text="#{forgot.btn}">Send Reset Link</button>
            </form>
            <p><a href="/login" th:text="#{nav.login}">Back to login</a></p>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
