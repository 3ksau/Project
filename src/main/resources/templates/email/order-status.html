<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, Helvetica, sans-serif;">
    <table role="presentation" style="width:100%; max-width:600px; margin:0 auto; background:#ffffff; border-radius:8px; overflow:hidden; margin-top:20px; margin-bottom:20px;">
        <tr>
            <td style="padding:30px 40px; background:#1a5276; text-align:center;">
                <h1 style="color:#ffffff; margin:0; font-size:24px;">Plumbing Store</h1>
            </td>
        </tr>
        <tr>
            <td style="padding:30px 40px;">
                <h2 style="color:#333; font-size:20px; margin-top:0;">Hello, <span th:text="${name}">User</span>!</h2>
                <p style="color:#555; font-size:15px; line-height:1.6;">
                    Your order <strong>#<span th:text="${orderId}">0</span></strong> status has been updated.
                </p>
                <table role="presentation" style="width:100%; margin:20px 0; background:#f8f9fa; border-radius:6px; padding:15px;">
                    <tr>
                        <td style="padding:8px 10px; color:#888; font-size:13px;">Previous status</td>
                        <td style="padding:8px 10px; text-align:right; font-size:14px;" th:text="${previousStatus}">NEW</td>
                    </tr>
                    <tr>
                        <td style="padding:8px 10px; color:#888; font-size:13px;">Current status</td>
                        <td style="padding:8px 10px; text-align:right; font-size:14px; font-weight:bold; color:#1a5276;" th:text="${currentStatus}">SHIPPED</td>
                    </tr>
                    <tr>
                        <td style="padding:8px 10px; color:#888; font-size:13px;">Total amount</td>
                        <td style="padding:8px 10px; text-align:right; font-size:14px; font-weight:bold;" th:text="${total}">$0.00</td>
                    </tr>
                </table>
                <p style="color:#555; font-size:15px; line-height:1.6;">Thank you for shopping with us!</p>
            </td>
        </tr>
        <tr>
            <td style="padding:20px 40px; background:#f4f4f4; text-align:center; color:#999; font-size:12px;">
                &copy; 2026 Plumbing Store. All rights reserved.
            </td>
        </tr>
    </table>
</body>
</html>
