<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, Helvetica, sans-serif;">
    <table role="presentation" style="width:100%; max-width:600px; margin:0 auto; background:#ffffff; border-radius:8px; overflow:hidden; margin-top:20px; margin-bottom:20px;">
        <tr>
            <td style="padding:30px 40px; background:#1a5276; text-align:center;">
                <h1 style="color:#ffffff; margin:0; font-size:24px;">Plumbing Store</h1>
            </td>
        </tr>
        <tr>
            <td style="padding:30px 40px;">
                <h2 style="color:#333; font-size:20px; margin-top:0;">Hello, <span th:text="${name}">User</span>!</h2>
                <p style="color:#555; font-size:15px; line-height:1.6;">
                    You have requested a password reset. Click the button below to set a new password.
                </p>
                <table role="presentation" style="width:100%; margin:25px 0;">
                    <tr>
                        <td style="text-align:center;">
                            <a th:href="${resetUrl}" style="display:inline-block; padding:14px 30px; background:#1a5276; color:#ffffff; text-decoration:none; border-radius:6px; font-size:16px; font-weight:bold;">Reset Password</a>
                        </td>
                    </tr>
                </table>
                <p style="color:#555; font-size:15px; line-height:1.6;">
                    This link will expire in 24 hours. If you did not request this, please ignore this email.
                </p>
                <p style="color:#555; font-size:15px; line-height:1.6;">Thank you,<br>Plumbing Store Team</p>
            </td>
        </tr>
        <tr>
            <td style="padding:20px 40px; background:#f4f4f4; text-align:center; color:#999; font-size:12px;">
                &copy; 2026 Plumbing Store. All rights reserved.
            </td>
        </tr>
    </table>
</body>
</html>
