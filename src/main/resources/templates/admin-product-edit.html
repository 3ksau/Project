<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:if="${product.id}" th:text="#{admin.product.edit}">Редактировать товар</title>
    <title th:unless="${product.id}" th:text="#{admin.product.new}">Новый товар</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div class="container">
    <a href="/admin/products" class="btn mb-1" th:text="#{admin.cancel}">← Назад</a>
    <div class="form-card">
        <h2 th:if="${product.id}" th:text="|#{admin.product.edit}: ${product.name}|">Редактировать</h2>
        <h2 th:unless="${product.id}" th:text="#{admin.product.new}">Новый товар</h2>

        <form method="post" th:action="@{/admin/products/save}" th:object="${product}">
            <input type="hidden" name="id" th:value="*{id}">

            <div class="form-group">
                <label th:text="#{admin.product.name}">Название</label>
                <input type="text" name="name" th:value="*{name}" required>
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.description}">Описание</label>
                <textarea name="description" rows="4" th:text="*{description}"></textarea>
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.price}">Цена</label>
                <input type="number" step="0.01" name="price" th:value="*{price}" required>
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.stock}">Количество на складе</label>
                <input type="number" name="stockQuantity" th:value="*{stockQuantity}" required>
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.brand}">Бренд</label>
                <input type="text" name="brand" th:value="*{brand}">
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.article}">Артикул</label>
                <input type="text" name="article" th:value="*{article}">
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.image}">Изображение (URL)</label>
                <input type="text" name="imageUrl" th:value="*{imageUrl}">
            </div>

            <div class="form-group">
                <label>Материал</label>
                <input type="text" name="material" th:value="*{material}" placeholder="Латунь, нержавейка, хром...">
            </div>

            <div class="form-group">
                <label>Цвет / покрытие</label>
                <input type="text" name="color" th:value="*{color}" placeholder="Хром, белый, матовый чёрный...">
            </div>

            <div class="form-group">
                <label>Вес (кг)</label>
                <input type="number" step="0.01" name="weight" th:value="*{weight}">
            </div>

            <div class="form-group">
                <label>Гарантия</label>
                <input type="text" name="warranty" th:value="*{warranty}" placeholder="5 лет">
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.available}">В наличии</label>
                <select name="available">
                    <option value="true" th:selected="*{available}" th:text="#{admin.yes}">Да</option>
                    <option value="false" th:selected="!*{available}" th:text="#{admin.no}">Нет</option>
                </select>
            </div>

            <div class="form-group">
                <label th:text="#{catalog.filter.category}">Категория</label>
                <select name="categoryId">
                    <option value="" th:text="#{admin.product.no.category}">— Без категории —</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == product.categoryId}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn" th:text="#{admin.save}">Сохранить</button>
        </form>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
