<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{profile.title}">Личный кабинет — Магазин сантехники</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div class="container">
    <nav class="breadcrumbs">
        <a href="/" th:text="#{nav.home}">Главная</a>
        <span class="sep">›</span>
        <span class="current">Личный кабинет</span>
    </nav>
    <h1 class="page-title">Личный кабинет</h1>

    <div class="success" th:if="${param.updated}">Данные сохранены</div>
    <div class="success" th:if="${param.password}">Пароль изменён</div>

    <div class="profile-layout">
        <div class="profile-sidebar">
            <div class="profile-avatar">
                <span th:text="${#strings.substring(user.email, 0, 1)}">U</span>
            </div>
            <h3 th:text="${user.fullName ?: user.email}">Имя</h3>
            <nav class="profile-nav">
                <a href="/profile" class="active">📋 Профиль</a>
                <a href="/profile/password">🔑 Пароль</a>
                <a href="/orders">📦 Мои заказы</a>
                <a href="/wishlist">❤️ Избранное</a>
            </nav>
        </div>

        <div class="profile-main">
            <h2>Основные данные</h2>
            <form method="post" action="/profile" class="profile-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:value="${user.email}" disabled class="form-control disabled">
                    <small>Email нельзя изменить</small>
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" name="fullName" th:value="${user.fullName}" class="form-control">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" name="phone" th:value="${user.phone}" class="form-control">
                </div>
                <div class="form-group">
                    <label>Адрес доставки</label>
                    <textarea name="address" rows="2" class="form-control" th:text="${user.address}"></textarea>
                </div>
                <button type="submit" class="btn" th:text="#{profile.save}">Сохранить</button>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
