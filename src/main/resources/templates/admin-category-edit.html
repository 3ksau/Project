<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:if="${category.id}" th:text="#{admin.category.edit}">Редактировать категорию</title>
    <title th:unless="${category.id}" th:text="#{admin.category.new}">Новая категория</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div class="container">
    <a href="/admin/categories" class="btn mb-1" th:text="#{admin.cancel}">← Назад</a>
    <div class="form-card">
        <h2 th:if="${category.id}" th:text="|#{admin.category.edit}: ${category.name}|">Редактировать</h2>
        <h2 th:unless="${category.id}" th:text="#{admin.category.new}">Новая категория</h2>

        <form method="post" th:action="@{/admin/categories/save}" th:object="${category}" enctype="multipart/form-data">
            <input type="hidden" name="id" th:if="*{id != null}" th:value="*{id}">

            <div class="form-group">
                <label th:text="#{admin.product.name}">Название</label>
                <input type="text" name="name" th:value="*{name}" required>
            </div>

            <div class="form-group">
                <label>Slug</label>
                <input type="text" name="slug" th:value="*{slug}">
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.description}">Описание</label>
                <textarea name="description" rows="3" th:text="*{description}"></textarea>
            </div>

            <div class="form-group">
                <label th:text="#{admin.product.image}">Изображение</label>
                <input type="file" name="imageFile" accept="image/*" class="form-control">
                <small style="color: var(--text-secondary); font-size: 0.75rem; display: block; margin-top: 0.25rem;" th:if="*{imageUrl}" th:text="|Текущее: *{imageUrl}|"></small>
                <input type="hidden" name="imageUrl" th:value="*{imageUrl}">
            </div>

            <button type="submit" class="btn" th:text="#{admin.save}">Сохранить</button>
        </form>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
