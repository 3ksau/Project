<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сравнение товаров — Магазин сантехники</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div class="container">
    <nav class="breadcrumbs">
        <a href="/" th:text="#{nav.home}">Главная</a>
        <span class="sep">›</span>
        <span class="current">Сравнение товаров</span>
    </nav>
    <h1 class="page-title">Сравнение товаров</h1>

    <div th:if="${#lists.isEmpty(products)}" class="empty-state" id="emptyCompare">
        <p>Нет товаров для сравнения</p>
        <a href="/catalog" class="btn">Перейти в каталог</a>
    </div>

    <div th:unless="${#lists.isEmpty(products)}" id="compareTableWrap" style="overflow-x: auto;">
        <table class="compare-table">
            <thead>
                <tr>
                    <th class="compare-label">Характеристика</th>
                    <th th:each="p : ${products}" class="compare-item">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <span th:text="${p.name}">Товар</span>
                            <button class="compare-remove" th:data-id="${p.id}" title="Убрать">✕</button>
                        </div>
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="compare-label">Фото</td>
                    <td th:each="p : ${products}" class="compare-item">
                        <div th:if="${p.imageUrl}" class="compare-img">
                            <img th:src="${p.imageUrl}" th:alt="${p.name}"/>
                        </div>
                        <div th:unless="${p.imageUrl}" class="compare-img" style="background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 0.8rem;">Нет фото</div>
                    </td>
                </tr>
                <tr>
                    <td class="compare-label">Цена</td>
                    <td th:each="p : ${products}" class="compare-item"><strong th:text="|${p.price} ₽|">Цена</strong></td>
                </tr>
                <tr>
                    <td class="compare-label">Артикул</td>
                    <td th:each="p : ${products}" class="compare-item" th:text="${p.article}">—</td>
                </tr>
                <tr>
                    <td class="compare-label">Бренд</td>
                    <td th:each="p : ${products}" class="compare-item" th:text="${p.brand}">—</td>
                </tr>
                <tr>
                    <td class="compare-label">Категория</td>
                    <td th:each="p : ${products}" class="compare-item" th:text="${p.categoryName}">—</td>
                </tr>
                <tr>
                    <td class="compare-label">Материал</td>
                    <td th:each="p : ${products}" class="compare-item" th:text="${p.material}">—</td>
                </tr>
                <tr>
                    <td class="compare-label">Цвет</td>
                    <td th:each="p : ${products}" class="compare-item" th:text="${p.color}">—</td>
                </tr>
                <tr>
                    <td class="compare-label">Вес</td>
                    <td th:each="p : ${products}" class="compare-item" th:text="${p.weight ? #strings.concat(p.weight, ' кг') : '—'}">—</td>
                </tr>
                <tr>
                    <td class="compare-label">Гарантия</td>
                    <td th:each="p : ${products}" class="compare-item" th:text="${p.warranty}">—</td>
                </tr>
                <tr>
                    <td class="compare-label">Наличие</td>
                    <td th:each="p : ${products}" class="compare-item">
                        <span th:if="${p.stockQuantity > 0}" style="color: var(--success);">В наличии</span>
                        <span th:unless="${p.stockQuantity > 0}" style="color: var(--danger);">Нет в наличии</span>
                    </td>
                </tr>
                <tr>
                    <td class="compare-label">Рейтинг</td>
                    <td th:each="p : ${products}" class="compare-item" th:text="${p.averageRating ? #strings.concat(p.averageRating, ' ★') : '—'}">—</td>
                </tr>
            </tbody>
        </table>
        <div style="text-align: center; margin-top: 2rem;">
            <a href="/catalog" class="btn">Вернуться в каталог</a>
            <button class="btn btn-secondary" onclick="localStorage.removeItem('compareIds'); window.location.reload();">Очистить список</button>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script>
document.querySelectorAll('.compare-remove').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        var ids = (localStorage.getItem('compareIds') || '').split(',').filter(Boolean).filter(function(i) { return i !== id; });
        localStorage.setItem('compareIds', ids.join(','));
        this.closest('tr').querySelectorAll('.compare-item').forEach(function(el) { el.style.opacity = '0.3'; });
        this.closest('th').querySelector('span').textContent = 'Удалён';
        if (ids.length === 0) setTimeout(function() { window.location.href = '/compare'; }, 800);
    });
});
</script>
</body>
</html>
