<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/app.js}" defer></script>
    <title th:text="${title}">Shop</title>
</head>
<body>
<header th:fragment="header">
    <div>
        <a href="/" class="logo" th:text="#{site.title}">Сантехника</a>
        <nav>
            <a href="/" th:text="#{nav.home}">Главная</a>
            <a href="/catalog" th:text="#{nav.catalog}">Каталог</a>
            <span sec:authorize="!isAuthenticated()">
                <a href="/login" th:text="#{nav.login}">Войти</a>
                <a href="/register" th:text="#{nav.register}">Регистрация</a>
            </span>
            <span sec:authorize="isAuthenticated()">
                <a href="/profile" th:text="#{nav.profile}">Кабинет</a>
                <a href="/wishlist" th:text="#{nav.wishlist}">Избранное</a>
                <a href="/compare" th:text="#{nav.compare}">Сравнение</a>
                <a href="/cart" th:text="#{nav.cart}">Корзина</a>
                <a href="/orders" th:text="#{nav.orders}">Заказы</a>
                <a sec:authorize="hasRole('ADMIN')" href="/admin/orders" class="nav-admin" th:text="#{nav.admin}">Админка</a>
                <span sec:authentication="name"></span>
                <a href="/logout" th:text="#{nav.logout}">Выйти</a>
            </span>
            <a href="?lang=en">EN</a> | <a href="?lang=ru">RU</a>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
        </nav>
    </div>
</header>
<script>
    (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
</script>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Quick view modal -->
    <div class="modal-overlay" id="quickViewModal" onclick="if(event.target===this)closeQuickView()">
        <div class="modal-content" id="quickViewContent">
            <button class="modal-close" onclick="closeQuickView()">✕</button>
            <div id="quickViewBody"></div>
        </div>
    </div>

    <div class="container" th:fragment="content">
        <div th:replace="${content}"></div>
    </div>

<footer th:fragment="footer">
    <p th:text="#{footer.copyright}">&copy; 2026 Магазин сантехники</p>
</footer>
</body>
</html>
