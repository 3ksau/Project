<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{reset.title}">Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div class="container">
    <div class="auth-form">
        <div th:if="${error}" class="error" th:text="${error}">Error</div>

        <div th:if="${token != null}">
            <h2 th:text="#{reset.title}">Reset Password</h2>
            <form method="post" th:action="@{/reset-password}">
                <input type="hidden" name="token" th:value="${token}">
                <input type="password" name="password" th:placeholder="#{reset.new.password}" required minlength="6">
                <input type="password" name="passwordConfirm" th:placeholder="#{reset.confirm.password}" required minlength="6">
                <button type="submit" class="btn" th:text="#{reset.btn}">Reset Password</button>
            </form>
        </div>
        <div th:unless="${token != null}">
            <p><a href="/forgot-password" th:text="#{forgot.title}">Request new link</a></p>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
