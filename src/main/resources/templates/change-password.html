<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля — Магазин сантехники</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div class="container">
    <nav class="breadcrumbs">
        <a href="/" th:text="#{nav.home}">Главная</a>
        <span class="sep">›</span>
        <a href="/profile">Личный кабинет</a>
        <span class="sep">›</span>
        <span class="current">Смена пароля</span>
    </nav>
    <h1 class="page-title">Смена пароля</h1>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <div class="profile-layout">
        <div class="profile-sidebar">
            <div class="profile-avatar">
                <span th:text="${#strings.substring(#authentication.name, 0, 1)}">U</span>
            </div>
            <nav class="profile-nav">
                <a href="/profile">📋 Профиль</a>
                <a href="/profile/password" class="active">🔑 Пароль</a>
                <a href="/orders">📦 Мои заказы</a>
                <a href="/wishlist">❤️ Избранное</a>
            </nav>
        </div>

        <div class="profile-main">
            <h2>Изменить пароль</h2>
            <form method="post" action="/profile/password" class="profile-form">
                <div class="form-group">
                    <label>Текущий пароль</label>
                    <input type="password" name="currentPassword" required class="form-control">
                </div>
                <div class="form-group">
                    <label>Новый пароль</label>
                    <input type="password" name="newPassword" required minlength="6" class="form-control">
                </div>
                <div class="form-group">
                    <label>Подтвердите новый пароль</label>
                    <input type="password" name="newPasswordConfirm" required minlength="6" class="form-control">
                </div>
                <button type="submit" class="btn">Сохранить пароль</button>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
